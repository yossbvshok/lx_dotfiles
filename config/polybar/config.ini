[colors]
bg0 = #090909
bg1 = #0a0a0a
bg2 = #0d0d0d
bg3 = #1a1a1a
bg4 = #2b2b2b
fg0 = #fefefe
fg1 = #ececec
fg2 = #dadada
fg3 = #bababa
fg4 = #9a9a9a
ac1 = #b392f0
ac2 = #ff9966
ac3 = #f97583
ac4 = #a2ffeb

transparency = #0000000
disabled = #4A4A4F

[bar/example]
width = 100%
height = 25px
; font sizes (size;x coordinate adjustment)
font-0 = "0xProto Nerd Font:style=Regular:size=9;3"
font-1 = "0xProto Nerd Font:style=Regular:size=10;3"
background = ${colors.bg1}
foreground = ${colors.fg1}
line-size = 0
border-bottom-size = 1
border-color = ${colors.bg4}
padding-left = 5px
padding-right = 10px
separator = " :: "
separator-foreground = ${colors.disabled}
modules-left = xworkspaces xwindow
modules-right = pulseaudio xkeyboard-layout memory tun eth date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

[module/systray]
type = internal/tray
format-margin = 8px
tray-spacing = 16px

[module/xworkspaces]
type = internal/xworkspaces
label-active = 󱄄
label-occupied = 󰹑
label-empty = 󰍹
label-active-foreground = ${colors.ac1}
label-occupied-foreground = ${colors.fg3}
label-empty-foreground = ${colors.disabled}
label-active-padding = 1
label-occupied-padding = 1
label-empty-padding = 1
label-active-underline= ${colors.transparency}
label-active-background = ${colors.transparency}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.fg1}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰽬 VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "󰽬 MUTED"
label-muted-foreground = ${colors.disabled}

[module/xkeyboard-layout]
type = custom/script
exec = ~/.config/polybar/scripts/xkeyboard.sh
tail = true
interval = 5
label = "STROKE %output%"

; [module/wlan0]
; type = custom/script
; exec = ~/.config/polybar/scripts/xwlan.sh
; tail = true
; interval = 2
; label = %output%

[module/eth]
type = custom/script
exec = ~/.config/polybar/scripts/xeth0.sh
tail = true
interval = 2
label = %output%

[module/tun]
type = custom/script
exec = ~/.config/polybar/scripts/xtun0.sh
tail = true
interval = 2
label = %output%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true